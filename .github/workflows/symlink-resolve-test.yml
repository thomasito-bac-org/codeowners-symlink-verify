name: symlink-resolve-test
on:
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: inspect sensitive.txt
        run: |
          echo "--- ls -la sensitive.txt ---"
          ls -la sensitive.txt
          echo "--- file sensitive.txt ---"
          file sensitive.txt
          echo "--- cat sensitive.txt ---"
          cat sensitive.txt
          echo "--- readlink sensitive.txt ---"
          readlink sensitive.txt
